name: Auto CI Checks (tsc, lint)

on:
  push:
    paths:
      - "frontend/src/**"

jobs:
  ci-checks:
    runs-on: ubuntu-latest

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: 依存関係のインストール
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - run: npm install
        working-directory: ./frontend

      # フロントエンド部分のCIチェック
      - name: Run Frontend TypeScript Type Check
        run: npm run typecheck
        working-directory: ./frontend

      - name: Run Frontend TypeScript Lint
        run: npx run lint
        working-directory: ./frontend
